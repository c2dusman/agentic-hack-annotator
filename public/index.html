<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnnotatorAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>AnnotatorAI</h1>
    <p class="subtitle">Paste any URL. Get an annotated visual. Instantly.</p>

    <form id="generate-form">
      <div class="field-group">
        <label for="url-input">URL</label>
        <input
          type="url"
          id="url-input"
          placeholder="https://example.com"
          required
          autocomplete="url"
        >
      </div>

      <div class="field-group">
        <label for="focus-input">Focus (optional)</label>
        <input
          type="text"
          id="focus-input"
          placeholder="e.g. How to connect Gmail, Setting up API keys"
        >
        <p class="helper-text">Leave blank and AI will decide what to annotate</p>
      </div>

      <button type="submit" id="generate-btn">Generate Image</button>

      <p id="inline-error" class="inline-error" hidden></p>
    </form>

    <div id="loading-section" hidden>
      <div class="spinner"></div>
      <p id="status-text" class="status-text"></p>
      <p id="long-running-notice" class="long-running-notice" hidden>Taking longer than usual...</p>
    </div>

    <div id="result-section" hidden>
      <img id="result-image" alt="Generated annotation">
      <a id="download-btn" class="download-btn">Download Image</a>
    </div>

    <div id="error-section" class="error-box" hidden>
      <p id="error-text"></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
