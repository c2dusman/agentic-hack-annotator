<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>AnnotatorAI Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700&family=Space+Grotesk:wght@600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    .card {
      width: 1080px;
      height: 1920px;
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      color: #CCCCCC;
      display: flex;
      flex-direction: column;
    }

    /* === TOP SECTION: Title + Steps === */
    .top-section {
      padding: 64px 64px 40px;
      flex: 0 0 auto;
    }

    .card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 64px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .pink-divider {
      width: 80px;
      height: 4px;
      background: #FF2D6B;
      margin-bottom: 24px;
    }

    .steps-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step {
      font-size: 30px;
      line-height: 1.5;
      color: #CCCCCC;
    }

    .step .arrow {
      color: #FF2D6B;
      font-weight: 700;
      margin-right: 8px;
    }

    .step .step-label {
      color: #FFFFFF;
      font-weight: 700;
    }

    /* === BOTTOM SECTION: Annotated Screenshot === */
    .screenshot-section {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 40px 40px;
      border-radius: 16px;
    }

    .screenshot-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    /* Dark overlay to dim the screenshot */
    .screenshot-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      z-index: 1;
    }

    /* Marker group — positioned at element x,y */
    .marker-group {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    /* Highlight circle around the element */
    .marker-highlight {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      border: 3px solid #FF2D6B;
      background: rgba(255, 45, 107, 0.12);
      box-shadow: 0 0 24px rgba(255, 45, 107, 0.3);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Numbered badge */
    .marker-number {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #FF2D6B;
      color: #FFFFFF;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: -20px;
      left: -20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 4;
    }

    .footer {
      position: absolute;
      bottom: 16px;
      left: 40px;
      right: 40px;
      text-align: center;
      font-size: 22px;
      color: rgba(255, 255, 255, 0.25);
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-section">
      <div class="card-title">{{CARD_TITLE}}</div>
      <div class="pink-divider"></div>
      <div class="steps-container">
        {{STEPS_HTML}}
      </div>
    </div>
    <div class="screenshot-section">
      <img src="data:image/png;base64,{{SCREENSHOT_BASE64}}" alt="Page screenshot">
      <div class="screenshot-overlay"></div>
      {{MARKERS_HTML}}
    </div>
    <div class="footer">AnnotatorAI &middot; {{PAGE_URL}}</div>
  </div>
</body>
</html>
