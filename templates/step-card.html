<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>AnnotatorAI Step Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700&family=Space+Grotesk:wght@600;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    .card {
      width: 1080px;
      height: 1920px;
      background: #0D0D0D;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      color: #CCCCCC;
      display: flex;
      flex-direction: column;
      padding: 80px 72px;
    }

    .step-indicator {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 24px;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 16px;
    }

    .step-number {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #FF2D6B;
      color: #FFFFFF;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 56px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.15;
    }

    .pink-divider {
      width: 80px;
      height: 4px;
      background: #FF2D6B;
      margin-bottom: 24px;
    }

    .step-description {
      font-size: 36px;
      color: #CCCCCC;
      line-height: 1.4;
      margin-bottom: 56px;
    }

    .zoom-container {
      flex: 1;
      border-radius: 16px;
      border: 3px solid #FF2D6B;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111111;
    }

    .zoom-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .footer {
      margin-top: auto;
      padding-top: 32px;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="step-indicator">{{STEP_INDICATOR}}</div>
    <div class="step-header">
      <div class="step-number">{{STEP_NUM}}</div>
      <div class="step-label">{{STEP_LABEL}}</div>
    </div>
    <div class="pink-divider"></div>
    <div class="step-description">{{STEP_DESCRIPTION}}</div>
    <div class="zoom-container">
      <img src="data:image/png;base64,{{CROPPED_BASE64}}" alt="Zoomed view">
    </div>
    <div class="footer">AnnotatorAI &middot; {{PAGE_URL}}</div>
  </div>
</body>
</html>
